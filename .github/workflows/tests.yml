name: Test Automáticos y Sincronización Early

# El robot se despertará con cada push a la rama 'main'
on:
  push:
    branches:
      - main

jobs:
  test-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para poder empujar código a otras ramas

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ejecutar Tests con Maven
        run: mvn clean test

      - name: Actualizar rama early si los tests pasan
        # Este paso solo se ejecuta si el paso anterior (mvn clean test) no da error
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:refs/heads/early